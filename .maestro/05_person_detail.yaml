appId: com.mateuszbialowas.FamilyTree
name: View person details
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Lista, tab.*"
    timeout: 10000

- tapOn: "Lista, tab.*"

# Add a person
- tapOn:
    id: "fab-add-person"
- tapOn:
    id: "input-first-name"
- inputText: "Jan"
- tapOn:
    id: "input-last-name"
- inputText: "Kowalski"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "btn-save-person"
    direction: DOWN
- tapOn:
    id: "btn-save-person"

# Tap on person to see details
- tapOn: "Jan Kowalski"

# Verify detail screen content
- assertVisible: "Jan Kowalski"
- assertVisible: "Mężczyzna"
- assertVisible: "Edytuj"
- assertVisible: "Dodaj relację"
- assertVisible: "Usuń osobę"
