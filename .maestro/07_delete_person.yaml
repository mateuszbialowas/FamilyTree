appId: com.mateuszbialowas.FamilyTree
name: Delete a person
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Lista, tab.*"
    timeout: 10000

- tapOn: "Lista, tab.*"

# Add a person
- tapOn:
    id: "fab-add-person"
- tapOn:
    id: "input-first-name"
- inputText: "Jan"
- tapOn:
    id: "input-last-name"
- inputText: "Kowalski"
- hideKeyboard
- scrollUntilVisible:
    element:
      id: "btn-save-person"
    direction: DOWN
- tapOn:
    id: "btn-save-person"

# Go to detail
- tapOn: "Jan Kowalski"

# Delete
- scrollUntilVisible:
    element:
      id: "btn-delete-person"
    direction: DOWN
- tapOn:
    id: "btn-delete-person"

# Confirm deletion in alert
- tapOn: "Usuń"

# Should be back on list with empty state
- assertVisible: "Twoja kronika jest pusta"
